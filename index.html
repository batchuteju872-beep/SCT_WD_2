<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interactive Stopwatch</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="stopwatch-container">
        <h1>STOPWATCH</h1>
        
        <div class="time-display" id="display">00:00:00.00</div>
        
        <div class="buttons-container">
            <button id="startBtn" class="btn start">Start</button>
            <button id="pauseBtn" class="btn pause">Pause</button>
            <button id="resetBtn" class="btn reset">Reset</button>
            <button id="lapBtn" class="btn lap">Lap</button>
        </div>

        <ul class="laps-list" id="lapsList"></ul>
    </div>

    <script src="script.js"></script>
</body>
</html>
